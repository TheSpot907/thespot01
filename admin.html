<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Spot Admin</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:black;color:white;padding:20px;text-align:center;}
.admin{background:white;margin:40px auto;padding:20px;max-width:400px;
box-shadow:0 0 10px rgba(0,0,0,0.1);border-radius:8px;}
input{width:100%;padding:10px;margin:8px 0;}
button{background:black;color:white;border:none;padding:10px;cursor:pointer;}
.product{background:white;margin:10px;padding:10px;border-radius:6px;}
</style>
</head>

<body>

<header><h1>Admin Panel</h1></header>

<div class="admin" id="login">
<h3>Admin Login</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="code" placeholder="Access Code">
<button onclick="login()">Login</button>
</div>

<div class="admin" id="panel" style="display:none;">

<h3>Add Product</h3>

<input type="text" id="name" placeholder="Product Name">
<input type="number" id="price" placeholder="Price (FCFA)">
<input type="text" id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<h3>Products</h3>
<div id="list"></div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function login(){
let code = document.getElementById("code").value;

if(code === "12THEspot12"){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
display();
}else{
alert("Wrong access code");
}
}

function addProduct(){
let name = document.getElementById("name").value;
let price = parseInt(document.getElementById("price").value);
let image = document.getElementById("image").value;

let euro = Math.ceil(price / 655);

products.push({name, price, euro, image});

localStorage.setItem("products", JSON.stringify(products));

display();
}

function removeProduct(index){
products.splice(index,1);
localStorage.setItem("products", JSON.stringify(products));
display();
}

function display(){
let list = document.getElementById("list");
list.innerHTML="";

products.forEach((p,i)=>{
list.innerHTML += `
<div class="product">
<img src="${p.image}" width="100%">
<h4>${p.name}</h4>
<p>${p.price} FCFA (€${p.euro})</p>
<button onclick="removeProduct(${i})">Delete</button>
</div>`;
});
}

</script>

</body>
</html>
